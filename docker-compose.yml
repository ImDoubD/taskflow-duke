version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow}
      POSTGRES_DB: ${DB_NAME:-taskflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow} -d ${DB_NAME:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-taskflow}
      DB_PASSWORD: ${DB_PASSWORD:-taskflow}
      DB_NAME: ${DB_NAME:-taskflow}
      DB_SSLMODE: disable
      PORT: ${PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_please_change_in_production}
      RUN_SEED: ${RUN_SEED:-true}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
